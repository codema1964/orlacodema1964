<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Orla-Codema64.ico">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a', 'brand-teal': '#0d9488', 'brand-amber': '#d97706',
                        'old-blue': '#3b82f6', 'new-purple': '#8b5cf6', 'btn-red': '#ef4444', 'modal-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); min-height: 100vh; }
        .photo-wrapper { position: relative; overflow: hidden; border-radius: 0.75rem; width: 100%; padding-top: 100%; background-color: #e2e8f0; cursor: pointer; }
        .photo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .photo-wrapper img.hidden-photo { opacity: 0; }
        .photo-wrapper:hover img.hidden-photo { opacity: 1; }
        .photo-wrapper:hover img.visible-photo { opacity: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; }
        .modal-edit-overlay { background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px); z-index: 100; }
        #splash-screen { position: fixed; inset: 0; background-color: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #splash-screen.hidden-splash { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="text-2xl font-black text-white tracking-widest animate-pulse">CODEMA 1964</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        const ADMIN_UID = 'TLshlr1Vz7PasQvIYXhbytBAq1n1';
        const VAPID_KEY = 'BBEipgrXPOxTPYzRFP63bF6NJVsDPUnsmhMhqAXSSaoX75oBEUbiNJZ0LG5GMxBrhipkcyBQZuTZ3WCscou5sY0';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let messaging; try { messaging = getMessaging(app); } catch(e) {}

        window.alumniData = [];
        window.currentView = null;
        window.selectedPerson = null;
        window.currentUserId = null;

        async function init() {
            await setPersistence(auth, browserLocalPersistence);
            await getRedirectResult(auth);

            onAuthStateChanged(auth, u => {
                if(u) {
                    window.currentUserId = u.uid;
                    const isAdmin = (u.uid === ADMIN_UID);
                    document.getElementById('admin-badge').innerHTML = isAdmin ? `<span class="bg-emerald-500/20 text-emerald-400 text-[10px] px-2 py-1 rounded border border-emerald-500/40">ADMIN</span>` : '';
                    if(isAdmin) document.getElementById('add-btn').classList.remove('hidden');
                    if(messaging) document.getElementById('notif-btn').classList.remove('hidden');
                } else {
                    signInAnonymously(auth);
                }
                document.getElementById('splash-screen').classList.add('hidden-splash');
                if(!window.currentView) document.getElementById('selection-modal').classList.remove('hidden');
            });
        }

        window.accesoSecretoAdmin = () => {
            signInWithRedirect(auth, new GoogleAuthProvider());
        };

        window.activarNotificaciones = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted' && messaging) {
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    await setDoc(doc(db, "suscripciones", window.currentUserId), { token, date: new Date() });
                    alert("Notificaciones activadas");
                }
            } catch (e) { alert("Error en notificaciones"); }
        };

        window.selectView = (v) => {
            window.currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            onSnapshot(query(collection(db, "artifacts/default-app-id/public/data/alumni")), s => {
                window.alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=> (a.apellidos||'').localeCompare(b.apellidos||''));
                renderOrla();
            });
        };

        function renderOrla() {
            const isOld = window.currentView === 'old';
            document.getElementById('orla-grid').innerHTML = window.alumniData.map(p => `
                <div class="bg-white/80 p-2 rounded-xl shadow-sm text-center">
                    <div class="photo-wrapper mb-2" onclick="openModal('${p.id}')">
                        <img src="${(isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || ''}" class="visible-photo">
                        <img src="${(isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl) || ''}" class="hidden-photo">
                    </div>
                    <div class="text-[12px] font-bold leading-tight">${p.nombre}<br>${p.apellidos}</div>
                </div>`).join('');
            
            const btn = document.getElementById('toggle-btn');
            btn.innerHTML = isOld ? '💼 Ver Presente' : '🎓 Ver Colegio';
            btn.className = `w-full md:w-auto px-6 py-3 rounded-xl text-white font-bold ${isOld?'bg-new-purple':'bg-old-blue'}`;
        }

        window.openModal = (id) => {
            window.selectedPerson = window.alumniData.find(p => p.id === id);
            const p = window.selectedPerson;
            const isOld = window.currentView === 'old';
            const isAdmin = (window.currentUserId === ADMIN_UID);

            document.getElementById('m-photo').src = (isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || '';
            document.getElementById('m-name').innerText = `${p.nombre} ${p.apellidos}`;
            
            const row = (l, v) => `<div class="flex justify-between py-1 border-b border-slate-700 text-sm"><span>${l}</span><span class="text-slate-300">${v||'-'}</span></div>`;
            
            document.getElementById('m-data-old').innerHTML = `<h4 class="text-old-blue font-bold text-xs mb-2">🎓 COLEGIO</h4>
                ${row('Nacimiento', p.fechaNacimiento)}
                ${row('Entrada', p.antiguo?.anoEntrada)}
                ${row('Salida', p.antiguo?.anoSalida)}
                ${row('Curso Ent.', p.antiguo?.cursoEntrada)}
                ${row('Curso Sal.', p.antiguo?.cursoSalida)}`;

            document.getElementById('m-data-new').innerHTML = `<h4 class="text-new-purple font-bold text-xs mb-2">💼 ACTUALIDAD</h4>
                ${row('Profesión', p.actual?.profesion)}
                ${row('Ciudad', p.actual?.ciudad)}
                ${row('Email', p.actual?.email)}`;

            document.getElementById('m-edit-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('m-del-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('modal').classList.remove('hidden');
        };

        window.openEdit = () => {
            const p = window.selectedPerson;
            document.getElementById('f-id').value = p.id;
            document.getElementById('f-nombre').value = p.nombre || '';
            document.getElementById('f-apellidos').value = p.apellidos || '';
            document.getElementById('f-nacimiento').value = p.fechaNacimiento || '';
            document.getElementById('f-foto-o').value = p.antiguo?.fotoUrl || '';
            document.getElementById('f-ent').value = p.antiguo?.anoEntrada || '';
            document.getElementById('f-sal').value = p.antiguo?.anoSalida || '';
            document.getElementById('f-cent').value = p.antiguo?.cursoEntrada || '';
            document.getElementById('f-csal').value = p.antiguo?.cursoSalida || '';
            document.getElementById('f-foto-n').value = p.actual?.fotoUrl || '';
            document.getElementById('f-prof').value = p.actual?.profesion || '';
            document.getElementById('f-ciu').value = p.actual?.ciudad || '';
            document.getElementById('f-mail').value = p.actual?.email || '';
            
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveData = async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const data = {
                nombre: document.getElementById('f-nombre').value,
                apellidos: document.getElementById('f-apellidos').value,
                fechaNacimiento: document.getElementById('f-nacimiento').value,
                antiguo: {
                    fotoUrl: document.getElementById('f-foto-o').value,
                    anoEntrada: document.getElementById('f-ent').value,
                    anoSalida: document.getElementById('f-sal').value,
                    cursoEntrada: document.getElementById('f-cent').value,
                    cursoSalida: document.getElementById('f-csal').value
                },
                actual: {
                    fotoUrl: document.getElementById('f-foto-n').value,
                    profesion: document.getElementById('f-prof').value,
                    ciudad: document.getElementById('f-ciu').value,
                    email: document.getElementById('f-mail').value
                }
            };

            try {
                const ref = doc(db, "artifacts/default-app-id/public/data/alumni", id);
                await updateDoc(ref, data);
                document.getElementById('edit-modal').classList.add('hidden');
            } catch (err) { alert("Error de permisos: Escribe 'admin' de nuevo"); }
        };

        window.deleteAlumnus = async () => {
            if(confirm("¿Borrar ficha?")) {
                await deleteDoc(doc(db, "artifacts/default-app-id/public/data/alumni", window.selectedPerson.id));
                document.getElementById('modal').classList.add('hidden');
            }
        };

        let buffer = "";
        window.addEventListener('keydown', e => {
            buffer += e.key.toLowerCase();
            if(buffer.endsWith("admin")) window.accesoSecretoAdmin();
            if(buffer.length > 10) buffer = buffer.substring(1);
        });

        init();
    </script>

    <div id="selection-modal" class="modal-overlay fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="bg-white p-8 rounded-2xl text-center max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-black mb-6 italic">CODEMA 1964</h2>
            <button onclick="selectView('old')" class="w-full py-4 mb-4 bg-old-blue text-white rounded-xl font-bold">🎓 COLEGIO</button>
            <button onclick="selectView('current')" class="w-full py-4 bg-new-purple text-white rounded-xl font-bold">💼 ACTUALIDAD</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-brand-dark text-white p-4 sticky top-0 z-40 flex justify-between items-center">
            <span class="font-black italic">CODEMA 64</span>
            <div class="flex gap-2 items-center">
                <div id="admin-badge"></div>
                <button id="notif-btn" onclick="activarNotificaciones()" class="hidden bg-brand-amber p-2 rounded-full">🔔</button>
                <button id="add-btn" onclick="alert('Usa el botón editar de una ficha para añadir o modificar')" class="hidden bg-brand-teal p-2 rounded-full">＋</button>
            </div>
        </header>
        <main class="p-4 max-w-6xl mx-auto">
            <button id="toggle-btn" onclick="window.currentView = window.currentView === 'old' ? 'current' : 'old'; renderOrla();" class="mb-6"></button>
            <div id="orla-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 flex items-center justify-center hidden p-4" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-modal-bg text-white rounded-2xl w-full max-w-2xl overflow-hidden border border-slate-700">
            <div class="p-6 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/3">
                    <img id="m-photo" class="w-full h-64 object-cover rounded-xl border border-slate-600 mb-4">
                    <button id="m-edit-btn" onclick="openEdit()" class="w-full py-2 bg-slate-700 rounded-lg text-xs font-bold mb-2">✏️ EDITAR</button>
                    <button id="m-del-btn" onclick="deleteAlumnus()" class="w-full py-2 bg-btn-red/50 rounded-lg text-xs font-bold">🗑️ BORRAR</button>
                </div>
                <div class="md:w-2/3">
                    <h2 id="m-name" class="text-2xl font-black mb-4 italic"></h2>
                    <div id="m-data-old" class="mb-4 p-3 bg-slate-800/50 rounded-xl"></div>
                    <div id="m-data-new" class="p-3 bg-slate-800/50 rounded-xl"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-edit-overlay fixed inset-0 flex items-center justify-center hidden p-4">
        <form onsubmit="saveData(event)" class="bg-modal-bg text-white p-6 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto border border-brand-teal space-y-4">
            <input type="hidden" id="f-id">
            <h2 class="font-bold border-b border-slate-700 pb-2">EDITAR COMPAÑERO</h2>
            <div class="grid grid-cols-2 gap-2">
                <input id="f-nombre" placeholder="Nombre" class="p-2 bg-slate-800 rounded">
                <input id="f-apellidos" placeholder="Apellidos" class="p-2 bg-slate-800 rounded">
            </div>
            <input id="f-nacimiento" placeholder="Nacimiento" class="w-full p-2 bg-slate-800 rounded">
            
            <div class="p-3 bg-old-blue/10 border border-old-blue/20 rounded-xl space-y-2">
                <p class="text-[10px] font-bold text-old-blue">DATOS COLEGIO</p>
                <input id="f-foto-o" placeholder="URL Foto Antigua" class="w-full p-2 bg-slate-800 rounded text-xs">
                <div class="grid grid-cols-2 gap-2">
                    <input id="f-ent" placeholder="Año Entr." class="p-2 bg-slate-800 rounded text-xs">
                    <input id="f-sal" placeholder="Año Sal." class="p-2 bg-slate-800 rounded text-xs">
                    <input id="f-cent" placeholder="Curso Entr." class="p-2 bg-slate-800 rounded text-xs">
                    <input id="f-csal" placeholder="Curso Sal." class="p-2 bg-slate-800 rounded text-xs">
                </div>
            </div>

            <div class="p-3 bg-new-purple/10 border border-new-purple/20 rounded-xl space-y-2">
                <p class="text-[10px] font-bold text-new-purple">DATOS ACTUALES</p>
                <input id="f-foto-n" placeholder="URL Foto Actual" class="w-full p-2 bg-slate-800 rounded text-xs">
                <input id="f-prof" placeholder="Profesión" class="w-full p-2 bg-slate-800 rounded text-xs">
                <div class="grid grid-cols-2 gap-2">
                    <input id="f-ciu" placeholder="Ciudad" class="p-2 bg-slate-800 rounded text-xs">
                    <input id="f-mail" placeholder="Email" class="p-2 bg-slate-800 rounded text-xs">
                </div>
            </div>

            <div class="flex gap-2">
                <button type="submit" class="flex-1 py-3 bg-brand-teal rounded-xl font-bold">GUARDAR</button>
                <button type="button" onclick="document.getElementById('edit-modal').classList.add('hidden')" class="px-4 bg-slate-700 rounded-xl">CERRAR</button>
            </div>
        </form>
    </div>

</body>
</html>
