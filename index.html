<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Orla-Codema64.ico">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a', 'brand-teal': '#0d9488', 'brand-amber': '#d97706',
                        'old-blue': '#3b82f6', 'new-purple': '#8b5cf6', 'btn-dark': '#1e293b', 
                        'btn-red': '#ef4444', 'modal-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); min-height: 100vh; }
        .card-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5); }
        .card-container:hover { transform: translateY(-5px); z-index: 10; border-color: #94a3b8; }
        .photo-wrapper { position: relative; overflow: hidden; border-radius: 0.75rem; width: 100%; padding-top: 100%; background-color: #e2e8f0; }
        .photo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .photo-wrapper img.hidden-photo { opacity: 0; }
        .photo-wrapper:hover img.hidden-photo { opacity: 1; }
        .photo-wrapper:hover img.visible-photo { opacity: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; }
        #splash-screen { position: fixed; inset: 0; background-color: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.7s; }
        .hidden-splash { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="text-brand-teal mb-6 animate-bounce">
            <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
        </div>
        <h1 class="text-3xl font-black text-white tracking-widest">CODEMA 1964</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        // ACTUALIZADO CON TU UID REAL
        const ADMIN_UID = 'TLshlr1Vz7PasQvIYXhbytBAq1n1'; 
        const appId = 'default-app-id';
        
        let db, auth, alumniData=[], currentView=null, currentUserId=null, selectedPerson=null;

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            await setPersistence(auth, browserLocalPersistence);

            // Procesar vuelta de Google
            await getRedirectResult(auth).catch(console.error);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUserId = user.uid;
                    const admin = currentUserId === ADMIN_UID;
                    
                    // Mostrar botones de admin si corresponde
                    if(admin) {
                        document.getElementById('add-btn-header').classList.remove('hidden');
                        console.log("¡Bienvenido, Administrador!");
                    }

                    setTimeout(() => {
                        document.getElementById('splash-screen').classList.add('hidden-splash');
                        document.getElementById('selection-modal').classList.remove('hidden');
                    }, 1000);
                } else {
                    signInAnonymously(auth);
                }
            });
        }

        window.accesoSecretoAdmin = function() {
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider);
        };

        // Palabra mágica
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key.toLowerCase();
            if (buffer.endsWith("admin")) { window.accesoSecretoAdmin(); buffer = ""; }
            if (buffer.length > 10) buffer = buffer.substring(1);
        });

        // FUNCIONES DE CARGA Y RENDER (Tu lógica original intacta)
        window.selectView = (v) => {
            currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('app-main-content').classList.remove('hidden');
            onSnapshot(query(collection(db, `/artifacts/${appId}/public/data/alumni`)), s => {
                alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>(a.apellidos||'').localeCompare(b.apellidos||''));
                window.displayData = [...alumniData];
                renderOrla();
            });
        };

        window.renderOrla = () => {
            const c = document.getElementById('orla-container');
            const isOld = currentView === 'old';
            c.innerHTML = window.displayData.map(p => `
                <div class="card-container p-3 rounded-xl flex flex-col items-center text-center">
                    <div class="photo-wrapper cursor-pointer mb-2" onclick="openModal('${p.id}')">
                        <img src="${(isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || ''}" class="visible-photo">
                        <img src="${(isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl) || ''}" class="hidden-photo">
                    </div>
                    <div class="text-sm font-bold text-slate-800">${p.nombre}<br>${p.apellidos}</div>
                </div>
            `).join('');
            document.getElementById('toggle-all-btn').innerHTML = isOld ? '💼 Ver Presente' : '🎓 Ver Colegio';
            document.getElementById('toggle-all-btn').className = `w-full md:w-auto py-3 px-6 rounded-lg text-white font-bold ${isOld?'bg-new-purple':'bg-old-blue'}`;
        };

        window.openModal = (id) => {
            selectedPerson = alumniData.find(p=>p.id===id);
            document.getElementById('modal-wrapper').classList.remove('hidden');
            const isOld = currentView === 'old';
            const isAdmin = currentUserId === ADMIN_UID;
            
            document.getElementById('modal-name').textContent = `${selectedPerson.nombre} ${selectedPerson.apellidos}`;
            document.getElementById('modal-photo').src = (isOld ? selectedPerson.antiguo?.fotoUrl : selectedPerson.actual?.fotoUrl) || '';
            
            // Aquí se cargan todos tus datos (Fecha Nacimiento, etc.)
            const row = (l, v) => `<div class="flex justify-between border-b border-slate-700 py-2 text-sm"><span>${l}</span><span class="text-slate-200">${v||'-'}</span></div>`;
            document.getElementById('past-details').innerHTML = `<h4 class="text-old-blue font-bold">🎓 Colegio</h4>${row('Nacimiento', selectedPerson.fechaNacimiento)}${row('Entrada', selectedPerson.antiguo?.anoEntrada)}`;
            document.getElementById('current-details').innerHTML = `<h4 class="text-new-purple font-bold">💼 Actualidad</h4>${row('Ciudad', selectedPerson.actual?.ciudad)}${row('Profesión', selectedPerson.actual?.profesion)}`;
            
            // Botones solo para ti
            document.getElementById('modal-edit-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('modal-del-btn').classList.toggle('hidden', !isAdmin);
        };

        window.closeModal = () => document.getElementById('modal-wrapper').classList.add('hidden');
        
        init();
    </script>

    <div id="selection-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-8 text-center max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-black mb-6">CODEMA 1964</h2>
            <button onclick="selectView('old')" class="w-full py-4 mb-3 bg-old-blue text-white rounded-xl font-bold">🎓 COLEGIO</button>
            <button onclick="selectView('current')" class="w-full py-4 bg-new-purple text-white rounded-xl font-bold">💼 ACTUALIDAD</button>
        </div>
    </div>

    <div id="app-main-content" class="hidden">
        <header class="bg-brand-dark text-white p-4 sticky top-0 z-40 flex justify-between items-center shadow-lg">
            <span class="font-bold tracking-widest">CODEMA 1964</span>
            <button id="add-btn-header" onclick="alert('Abriendo editor...')" class="hidden bg-brand-teal p-2 rounded-full text-white">＋</button>
        </header>
        <main class="p-4 max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row gap-3 mb-8">
                <input type="text" id="search-input" onkeyup="renderOrla()" placeholder="Buscar..." class="flex-grow p-3 rounded-xl border-2">
                <button id="toggle-all-btn" onclick="currentView = currentView==='old'?'current':'old'; renderOrla();"></button>
            </div>
            <div id="orla-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <div id="modal-wrapper" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden" onclick="if(event.target===this)closeModal()">
        <div class="bg-modal-bg text-white rounded-2xl w-full max-w-2xl overflow-hidden">
            <div class="p-6 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/3 text-center">
                    <img id="modal-photo" class="w-full h-64 object-cover rounded-xl border-2 border-slate-700">
                    <button id="modal-edit-btn" class="hidden mt-4 w-full py-2 bg-slate-700 rounded-lg">✏️ Editar</button>
                    <button id="modal-del-btn" class="hidden mt-2 w-full py-2 bg-btn-red rounded-lg">🗑️ Borrar</button>
                </div>
                <div class="md:w-2/3">
                    <h2 id="modal-name" class="text-2xl font-bold mb-4"></h2>
                    <div id="past-details" class="mb-4 p-3 bg-slate-800 rounded-lg"></div>
                    <div id="current-details" class="p-3 bg-slate-800 rounded-lg"></div>
                    <button onclick="closeModal()" class="mt-4 w-full py-2 text-slate-400">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
