<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Orla-Codema64.ico">
    <meta name="theme-color" content="#0d9488">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a', 
                        'brand-teal': '#0d9488', 
                        'brand-amber': '#d97706',
                        'old-blue': '#3b82f6', 
                        'new-purple': '#8b5cf6',
                        'btn-dark': '#1e293b', 
                        'btn-red': '#ef4444',
                        'modal-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-out': 'fadeOut 0.7s ease-out forwards',
                        'bounce-slow': 'bounce 2s infinite',
                    },
                    keyframes: {
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0', visibility: 'hidden' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            color: #1e293b;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .card-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .card-container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #94a3b8;
            z-index: 10;
        }
        .photo-wrapper {
            position: relative; overflow: hidden; border-radius: 0.75rem; width: 100%; padding-top: 100%;
            background-color: #e2e8f0;
        }
        .photo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .photo-wrapper img.hidden-photo { opacity: 0; transform: scale(1.1); filter: blur(2px); }
        .photo-wrapper:hover img.hidden-photo { opacity: 1; transform: scale(1); filter: blur(0px); }
        .photo-wrapper:hover img.visible-photo { opacity: 0; transform: scale(0.9); }
        
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; }
        .modal-edit-overlay { background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px); z-index: 60; }
        
        .dark-scroll::-webkit-scrollbar { width: 6px; }
        .dark-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .dark-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a;
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.7s ease-out, visibility 0.7s;
        }
        #splash-screen.hidden-splash {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="text-brand-teal mb-6 animate-bounce-slow">
            <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
        </div>
        <h1 class="text-3xl font-black text-white tracking-widest mb-2">CODEMA 1964</h1>
        <p class="text-slate-400 text-sm font-medium tracking-wide uppercase">Cargando Recuerdos...</p>
        <div class="mt-8 w-8 h-8 border-4 border-brand-teal border-t-transparent rounded-full animate-spin"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        const ADMIN_UID = 'hbQ6YVVOZqVQ6HbHgNhzeci6rQ52';
        const ADMIN_EMAIL = 'codema1964@gmail.com'; 
        const appId = 'default-app-id'; 
        const VAPID_KEY = 'BBEipgrXPOxTPYzRFP63bF6NJVsDPUnsmhMhqAXSSaoX75oBEUbiNJZ0LG5GMxBrhipkcyBQZuTZ3WCscou5sY0'; 
        
        let db, auth, messaging, alumniData=[], currentView=null, selectedPerson=null, currentUserId=null; 
        const getCollectionPath = () => `/artifacts/${appId}/public/data/alumni`;

        async function init() {
            const minSplashTime = new Promise(resolve => setTimeout(resolve, 2000));
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                try { messaging = getMessaging(app); } catch(e) {}

                await setPersistence(auth, browserLocalPersistence);
                
                // PRIORIDAD: Procesar el resultado del Login de Google
                await getRedirectResult(auth).catch(console.error);
                
                onAuthStateChanged(auth, async u => {
                    if(u) {
                        currentUserId = u.uid;
                        const admin = currentUserId === ADMIN_UID;
                        
                        document.getElementById('current-uid-display').innerHTML = admin ? 
                            `<span class="text-emerald-400 text-xs font-mono bg-emerald-900/30 px-2 py-1 rounded border border-emerald-500/30">ADMIN</span>` : ``;
                        
                        if(admin) document.getElementById('add-btn-header').classList.remove('hidden');
                        if(messaging) document.getElementById('notif-btn-header').classList.remove('hidden');

                        await minSplashTime;
                        document.getElementById('splash-screen').classList.add('hidden-splash');
                        document.getElementById('selection-modal').classList.remove('hidden');
                    } else {
                        signInAnonymously(auth);
                    }
                });
            } catch(e) { console.error(e); }
        }

        // FUNCIÓN DE ACCESO GOOGLE
        window.accesoSecretoAdmin = function() {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            signInWithRedirect(auth, provider);
        };

        // Escucha de palabra "admin"
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key.toLowerCase();
            if (buffer.endsWith("admin")) { window.accesoSecretoAdmin(); buffer = ""; }
            if (buffer.length > 10) buffer = buffer.substring(1);
        });

        // --- LÓGICA DE DATOS Y RENDERIZADO (RESTAURADA) ---
        window.selectView = function(v) {
            currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('app-main-content').classList.remove('hidden');
            onSnapshot(query(collection(db, getCollectionPath())), s => {
                alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>(a.apellidos||'').localeCompare(b.apellidos||''));
                window.displayData = [...alumniData];
                renderOrla();
            });
        }

        window.renderOrla = function() {
            const c = document.getElementById('orla-container');
            const isOld = currentView === 'old';
            c.innerHTML = window.displayData.map(p => {
                const url = isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl;
                const hidden = isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl;
                return `<div class="card-container p-2 sm:p-3 rounded-xl flex flex-col items-center text-center group relative">
                    <div class="photo-wrapper cursor-pointer mb-2 border border-gray-200" onclick="openModal('${p.id}')">
                        <img src="${url||''}" onerror="this.src='https://placehold.co/300x300/cccccc/000000?text=?'" class="visible-photo">
                        <img src="${hidden||''}" onerror="this.src='https://placehold.co/300x300/cccccc/000000?text=?'" class="hidden-photo">
                    </div>
                    <div class="w-full">
                        <div class="font-bold text-slate-800 text-sm leading-tight">${p.nombre}</div>
                        <div class="font-bold text-slate-800 text-sm leading-tight">${p.apellidos}</div>
                    </div>
                </div>`;
            }).join('');
            
            const btn = document.getElementById('toggle-all-btn');
            btn.innerHTML = isOld ? '💼 Ver Actualidad' : '🎓 Ver Colegio';
            btn.className = `w-full md:w-auto py-3 px-6 rounded-lg text-white font-bold shadow-lg ${isOld?'bg-new-purple':'bg-old-blue'}`;
            document.getElementById('header-title').innerHTML = isOld ? 'CODEMA 1964 | <span class="opacity-70 font-light">Colegio</span>' : 'CODEMA 1964 | <span class="opacity-70 font-light">Presente</span>';
        }

        window.openModal = function(id) {
            selectedPerson = alumniData.find(p=>p.id===id);
            document.getElementById('modal-wrapper').classList.remove('hidden');
            updateModal(currentView);
        }

        function formatDate(d) { if(!d) return '-'; const p = d.split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : d; }

        window.updateModal = function(view) {
            if(!selectedPerson) return;
            const isOld = view === 'old';
            document.getElementById('modal-view-state').value = view;
            document.getElementById('modal-name').textContent = `${selectedPerson.nombre} ${selectedPerson.apellidos}`;
            document.getElementById('modal-photo').src = (isOld ? selectedPerson.antiguo?.fotoUrl : selectedPerson.actual?.fotoUrl) || '';

            const p = selectedPerson.antiguo||{}; const c = selectedPerson.actual||{};
            const row = (l,v) => `<div class="flex justify-between border-b border-slate-700 py-2 text-sm"><span class="text-slate-400 font-medium">${l}</span><span class="text-slate-200 text-right">${v||'-'}</span></div>`;

            document.getElementById('past-details').innerHTML = `<h4 class="text-old-blue font-bold mb-2">🎓 Etapa Colegio</h4>${row('Fecha Nac.', formatDate(selectedPerson.fechaNacimiento))}${row('Años', (p.anoEntrada||'?') + ' - ' + (p.anoSalida||'?'))}${row('Curso Entr.', p.cursoEntrada)}${row('Curso Sal.', p.cursoSalida)}${row('Foto', p.fechaFoto)}`;
            document.getElementById('current-details').innerHTML = `<h4 class="text-new-purple font-bold mb-2">💼 Actualidad</h4>${row('Profesión', c.profesion)}${row('Ciudad', c.ciudad)}${row('Email', c.email)}`;

            const admin = currentUserId === ADMIN_UID;
            document.getElementById('modal-edit-btn').classList.toggle('hidden', !admin);
            document.getElementById('modal-del-btn').classList.toggle('hidden', !admin);
            document.getElementById('modal-mail-btn').classList.toggle('hidden', admin);

            const tgl = document.getElementById('modal-toggle-btn');
            tgl.textContent = isOld ? 'Ver Foto Actual' : 'Ver Foto Antigua';
            tgl.className = `w-full py-3 rounded-lg font-bold text-white shadow mt-4 ${isOld?'bg-new-purple':'bg-old-blue'}`;
        }

        window.openDataEntryModal = function(mode, id=null) {
            document.getElementById('data-entry-form').reset();
            document.getElementById('form-mode').value = mode;
            document.getElementById('form-doc-id').value = id || '';
            if(mode === 'edit' && id) {
                const p = alumniData.find(x => x.id === id);
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('apellidos').value = p.apellidos;
                document.getElementById('fechaNacimiento').value = p.fechaNacimiento || '';
                document.getElementById('fotoAntiguaUrl').value = p.antiguo?.fotoUrl || '';
                document.getElementById('anoEntrada').value = p.antiguo?.anoEntrada || '';
                document.getElementById('anoSalida').value = p.antiguo?.anoSalida || '';
                document.getElementById('cursoEntrada').value = p.antiguo?.cursoEntrada || '';
                document.getElementById('cursoSalida').value = p.antiguo?.cursoSalida || '';
                document.getElementById('fechaFotoAntigua').value = p.antiguo?.fechaFoto || '';
                document.getElementById('fotoActualUrl').value = p.actual?.fotoUrl || '';
                document.getElementById('profesion').value = p.actual?.profesion || '';
                document.getElementById('ciudad').value = p.actual?.ciudad || '';
                document.getElementById('email').value = p.actual?.email || '';
            }
            document.getElementById('data-entry-modal').classList.remove('hidden');
        }

        window.saveAlumnusData = async function(e) {
            e.preventDefault();
            const mode = document.getElementById('form-mode').value;
            const docId = document.getElementById('form-doc-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                apellidos: document.getElementById('apellidos').value,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                antiguo: {
                    fotoUrl: document.getElementById('fotoAntiguaUrl').value, anoEntrada: document.getElementById('anoEntrada').value, 
                    anoSalida: document.getElementById('anoSalida').value, cursoEntrada: document.getElementById('cursoEntrada').value,
                    cursoSalida: document.getElementById('cursoSalida').value, fechaFoto: document.getElementById('fechaFotoAntigua').value
                },
                actual: {
                    fotoUrl: document.getElementById('fotoActualUrl').value, profesion: document.getElementById('profesion').value,
                    ciudad: document.getElementById('ciudad').value, email: document.getElementById('email').value
                }
            };
            mode === 'add' ? await addDoc(collection(db, getCollectionPath()), data) : await updateDoc(doc(db, getCollectionPath(), docId), data);
            document.getElementById('data-entry-modal').classList.add('hidden');
        }

        window.closeModal = () => document.getElementById('modal-wrapper').classList.add('hidden');
        window.closeDataEntryModal = () => document.getElementById('data-entry-modal').classList.add('hidden');
        window.performSearch = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            window.displayData = alumniData.filter(p => (p.nombre + ' ' + p.apellidos).toLowerCase().includes(q));
            renderOrla();
        }
        window.toggleAllPhotos = () => { currentView = currentView==='old'?'current':'old'; renderOrla(); }

        init();
    </script>

    <div id="selection-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-old-blue to-new-purple"></div>
            <h2 class="text-3xl font-black text-slate-800 mb-2">Corazón de María</h2>
            <p class="text-3xl font-black text-slate-800 mb-6">Generación 64</p>
            <div class="space-y-3">
                <button onclick="selectView('old')" class="w-full py-4 rounded-xl text-white font-bold bg-old-blue shadow-lg hover:scale-105 transition">🎓 Colegio</button>
                <button onclick="selectView('current')" class="w-full py-4 rounded-xl text-white font-bold bg-new-purple shadow-lg hover:scale-105 transition">💼 Actualidad</button>
            </div>
        </div>
    </div>

    <div id="app-main-content" class="hidden flex flex-col min-h-screen">
        <header class="bg-brand-dark text-white shadow-md sticky top-0 z-40 border-b border-slate-800">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                <h1 id="header-title" class="text-lg md:text-xl font-bold truncate">Orla</h1>
                <div class="flex items-center gap-3">
                    <button id="notif-btn-header" class="hidden bg-brand-amber p-2 rounded-full shadow"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></button>
                    <div id="current-uid-display"></div>
                    <button id="add-btn-header" onclick="openDataEntryModal('add')" class="hidden bg-brand-teal p-2 rounded-full shadow"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></button>
                </div>
            </div>
        </header>

        <main class="flex-grow max-w-7xl mx-auto px-3 sm:px-6 py-4 w-full">
            <div class="bg-white/90 backdrop-blur p-3 md:p-4 rounded-2xl shadow border border-slate-200 mb-6 flex flex-col md:flex-row gap-3 sticky top-16 z-30">
                <input type="text" id="search-input" onkeyup="performSearch()" placeholder="Buscar..." class="w-full md:flex-grow bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-brand-teal">
                <button id="toggle-all-btn" onclick="toggleAllPhotos()"></button>
            </div>
            <div id="orla-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-6 pb-20"></div>
        </main>
    </div>

    <div id="modal-wrapper" class="modal-overlay fixed inset-0 flex items-end md:items-center justify-center p-0 md:p-4 hidden" onclick="if(event.target.id==='modal-wrapper')closeModal()">
        <div class="bg-modal-bg w-full md:max-w-4xl md:rounded-2xl rounded-t-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col max-h-[90vh] dark-scroll">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 shrink-0">
                <h2 id="modal-name" class="text-lg font-bold text-white truncate pr-4"></h2>
                <button onclick="closeModal()" class="text-slate-400 text-2xl p-2">&times;</button>
            </div>
            <div class="overflow-y-auto p-6">
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="md:w-5/12 flex flex-col items-center">
                        <div class="w-48 h-48 md:w-64 md:h-64 rounded-xl overflow-hidden border-2 border-slate-600 mb-4">
                            <img id="modal-photo" class="w-full h-full object-cover">
                        </div>
                        <input type="hidden" id="modal-view-state">
                        <button id="modal-toggle-btn" onclick="updateModal(document.getElementById('modal-view-state').value==='old'?'current':'old')"></button>
                        <div class="w-full mt-4 flex gap-3">
                            <button id="modal-mail-btn" class="hidden w-full py-3 rounded-lg bg-brand-amber text-white font-bold">✉ Enviar Datos</button>
                            <button id="modal-edit-btn" onclick="openDataEntryModal('edit', selectedPerson.id)" class="hidden flex-1 py-3 rounded-lg bg-slate-700 text-white font-bold border border-slate-600">✏️ Editar</button>
                            <button id="modal-del-btn" class="hidden flex-1 py-3 rounded-lg bg-btn-red text-white font-bold">🗑️ Borrar</button>
                        </div>
                    </div>
                    <div class="md:w-7/12 space-y-4">
                        <div id="past-details" class="bg-slate-800/50 p-4 rounded-xl border border-slate-700"></div>
                        <div id="current-details" class="bg-slate-800/50 p-4 rounded-xl border border-slate-700"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="data-entry-modal" class="modal-edit-overlay fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-modal-bg w-full md:max-w-2xl rounded-2xl shadow-2xl border border-slate-700 p-6 max-h-[95vh] overflow-y-auto dark-scroll text-white">
            <div class="flex justify-between mb-4">
                <h2 class="text-xl font-bold">Datos del Alumno</h2>
                <button onclick="closeDataEntryModal()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            <form id="data-entry-form" onsubmit="saveAlumnusData(event)" class="space-y-4">
                <input type="hidden" id="form-mode"><input type="hidden" id="form-doc-id">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="nombre" placeholder="Nombre" required class="p-3 bg-slate-800 border border-slate-600 rounded-lg">
                    <input type="text" id="apellidos" placeholder="Apellidos" required class="p-3 bg-slate-800 border border-slate-600 rounded-lg">
                </div>
                <input type="date" id="fechaNacimiento" class="w-full p-3 bg-slate-800 border border-slate-600 rounded-lg">
                <div class="p-3 bg-blue-900/10 rounded-xl border border-blue-900/30">
                    <h3 class="font-bold text-old-blue mb-2 text-sm">DATOS COLEGIO</h3>
                    <input type="url" id="fotoAntiguaUrl" placeholder="URL Foto Antigua" class="w-full p-2 mb-2 bg-slate-800 border border-slate-600 rounded">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="number" id="anoEntrada" placeholder="Año Entr." class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                        <input type="number" id="anoSalida" placeholder="Año Sal." class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="cursoEntrada" placeholder="Curso Entr." class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                        <input type="text" id="cursoSalida" placeholder="Curso Sal." class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                    </div>
                    <input type="text" id="fechaFotoAntigua" placeholder="Detalle Foto" class="w-full p-2 mt-2 bg-slate-800 border border-slate-600 rounded">
                </div>
                <div class="p-3 bg-purple-900/10 rounded-xl border border-purple-900/30">
                    <h3 class="font-bold text-new-purple mb-2 text-sm">DATOS ACTUALES</h3>
                    <input type="url" id="fotoActualUrl" placeholder="URL Foto Actual" class="w-full p-2 mb-2 bg-slate-800 border border-slate-600 rounded">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="profesion" placeholder="Profesión" class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                        <input type="text" id="ciudad" placeholder="Ciudad" class="p-2 bg-slate-800 border border-slate-600 rounded text-sm">
                    </div>
                    <input type="email" id="email" placeholder="Email" class="w-full p-2 mt-2 bg-slate-800 border border-slate-600 rounded text-sm">
                </div>
                <button type="submit" class="w-full py-4 bg-brand-teal text-white font-bold rounded-xl shadow">GUARDAR FICHA</button>
            </form>
        </div>
    </div>

</body>
</html>
