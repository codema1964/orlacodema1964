<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Orla-Codema64.ico">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a', 'brand-teal': '#0d9488', 'brand-amber': '#d97706',
                        'old-blue': '#3b82f6', 'new-purple': '#8b5cf6', 'btn-dark': '#1e293b', 
                        'btn-red': '#ef4444', 'modal-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'bounce-slow': 'bounce 2s infinite' }
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); min-height: 100vh; }
        .card-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5); }
        .card-container:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); z-index: 10; }
        .photo-wrapper { position: relative; overflow: hidden; border-radius: 0.75rem; width: 100%; padding-top: 100%; background-color: #e2e8f0; }
        .photo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .photo-wrapper img.hidden-photo { opacity: 0; }
        .photo-wrapper:hover img.hidden-photo { opacity: 1; }
        .photo-wrapper:hover img.visible-photo { opacity: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .hidden-splash { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo" class="text-brand-teal mb-6 animate-bounce-slow cursor-pointer">
            <svg class="w-24 h-24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
        </div>
        <h1 class="text-3xl font-black text-white tracking-widest mb-2">CODEMA 1964</h1>
        <p class="text-slate-400 text-sm font-medium uppercase">Cargando Recuerdos...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        const ADMIN_UID = 'hbQ6YVVOZqVQ6HbHgNhzeci6rQ52';
        const appId = 'default-app-id';
        const VAPID_KEY = 'BBEipgrXPOxTPYzRFP63bF6NJVsDPUnsmhMhqAXSSaoX75oBEUbiNJZ0LG5GMxBrhipkcyBQZuTZ3WCscou5sY0';
        
        let db, auth, messaging, alumniData=[], currentView=null, currentUserId=null, selectedPerson=null;
        const getCollectionPath = () => `/artifacts/${appId}/public/data/alumni`;

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            try { messaging = getMessaging(app); } catch(e) {}

            await setPersistence(auth, browserLocalPersistence);

            // PRIORIDAD: Procesar el resultado de la redirección antes de hacer nada más
            const redirectResult = await getRedirectResult(auth).catch(console.error);
            
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUserId = user.uid;
                    console.log("Usuario actual:", currentUserId);
                    
                    if (currentUserId === ADMIN_UID) {
                        document.getElementById('add-btn-header').classList.remove('hidden');
                        document.getElementById('current-uid-display').innerHTML = `<span class="bg-emerald-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">ADMIN</span>`;
                    }

                    if(messaging) document.getElementById('notif-btn-header').classList.remove('hidden');
                    
                    setTimeout(() => {
                        document.getElementById('splash-screen').classList.add('hidden-splash');
                        document.getElementById('selection-modal').classList.remove('hidden');
                    }, 1000);
                } else {
                    signInAnonymously(auth);
                }
            });
        }

        // ACCESO ADMIN
        window.accesoSecretoAdmin = function() {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            signInWithRedirect(auth, provider);
        };

        // Escucha de palabra "admin"
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key.toLowerCase();
            if (buffer.endsWith("admin")) { window.accesoSecretoAdmin(); buffer = ""; }
            if (buffer.length > 10) buffer = buffer.substring(1);
        });

        // 5 Clics en el logo
        let clics = 0;
        document.getElementById('splash-logo').addEventListener('click', () => {
            clics++;
            if(clics === 5) window.accesoSecretoAdmin();
        });

        // --- FUNCIONES DE LA APP ---
        window.selectView = (v) => {
            currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('app-main-content').classList.remove('hidden');
            onSnapshot(query(collection(db, getCollectionPath())), s => {
                alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>(a.apellidos||'').localeCompare(b.apellidos||''));
                window.displayData = [...alumniData];
                renderOrla();
            });
        };

        window.renderOrla = () => {
            const c = document.getElementById('orla-container');
            const isOld = currentView === 'old';
            c.innerHTML = window.displayData.map(p => {
                const url = isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl;
                const hidden = isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl;
                return `<div class="card-container p-2 rounded-xl flex flex-col items-center text-center group">
                    <div class="photo-wrapper cursor-pointer mb-2 border border-gray-200" onclick="openModal('${p.id}')">
                        <img src="${url||''}" onerror="this.src='https://placehold.co/300?text=?'" class="visible-photo">
                        <img src="${hidden||''}" onerror="this.src='https://placehold.co/300?text=?'" class="hidden-photo">
                    </div>
                    <div class="text-sm font-bold text-slate-800 leading-tight">${p.nombre}<br>${p.apellidos}</div>
                </div>`;
            }).join('');
            document.getElementById('toggle-all-btn').innerHTML = isOld ? '💼 Ver Presente' : '🎓 Ver Colegio';
            document.getElementById('toggle-all-btn').className = `w-full md:w-auto py-3 px-6 rounded-lg text-white font-bold ${isOld?'bg-purple-600':'bg-blue-600'}`;
        };

        window.toggleAllPhotos = () => { currentView = currentView==='old'?'current':'old'; renderOrla(); };
        window.performSearch = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            window.displayData = alumniData.filter(p => `${p.nombre} ${p.apellidos}`.toLowerCase().includes(q));
            renderOrla();
        };

        window.openModal = (id) => {
            selectedPerson = alumniData.find(p=>p.id===id);
            document.getElementById('modal-wrapper').classList.remove('hidden');
            updateModal(currentView);
        };

        window.updateModal = (view) => {
            const isOld = view === 'old';
            const p = selectedPerson;
            document.getElementById('modal-name').textContent = `${p.nombre} ${p.apellidos}`;
            document.getElementById('modal-photo').src = (isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || '';
            
            const row = (l, v) => `<div class="flex justify-between border-b border-slate-700 py-2"><span>${l}</span><span class="text-slate-200">${v||'-'}</span></div>`;
            document.getElementById('past-details').innerHTML = `<h4 class="text-blue-400 font-bold">🎓 Colegio</h4>${row('Años', p.antiguo?.anoEntrada + '-' + p.antiguo?.anoSalida)}`;
            document.getElementById('current-details').innerHTML = `<h4 class="text-purple-400 font-bold">💼 Presente</h4>${row('Profesión', p.actual?.profesion)}${row('Ciudad', p.actual?.ciudad)}`;
            
            const btnEdit = document.getElementById('modal-edit-btn');
            if (currentUserId === ADMIN_UID) {
                btnEdit.classList.remove('hidden');
                btnEdit.onclick = () => openDataEntryModal('edit', p.id);
            }
        };

        window.openDataEntryModal = (mode, id=null) => {
            document.getElementById('data-entry-modal').classList.remove('hidden');
            document.getElementById('data-entry-form').reset();
            document.getElementById('form-mode').value = mode;
            document.getElementById('form-doc-id').value = id || '';
            if(mode === 'edit' && id) {
                const p = alumniData.find(x => x.id === id);
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('apellidos').value = p.apellidos;
                document.getElementById('fechaNacimiento').value = p.fechaNacimiento || '';
                document.getElementById('fotoAntiguaUrl').value = p.antiguo?.fotoUrl || '';
                document.getElementById('fotoActualUrl').value = p.actual?.fotoUrl || '';
            }
        };

        window.saveAlumnusData = async (e) => {
            e.preventDefault();
            const mode = document.getElementById('form-mode').value;
            const id = document.getElementById('form-doc-id').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                apellidos: document.getElementById('apellidos').value,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                antiguo: { fotoUrl: document.getElementById('fotoAntiguaUrl').value },
                actual: { fotoUrl: document.getElementById('fotoActualUrl').value, profesion: document.getElementById('profesion-input').value, ciudad: document.getElementById('ciudad-input').value }
            };
            mode === 'add' ? await addDoc(collection(db, getCollectionPath()), data) : await updateDoc(doc(db, getCollectionPath(), id), data);
            document.getElementById('data-entry-modal').classList.add('hidden');
            window.closeModal();
        };

        window.closeModal = () => document.getElementById('modal-wrapper').classList.add('hidden');
        window.closeDataEntryModal = () => document.getElementById('data-entry-modal').classList.add('hidden');

        init();
    </script>

    <div id="selection-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-8 text-center shadow-2xl max-w-sm w-full">
            <h2 class="text-2xl font-black mb-6">CODEMA 1964</h2>
            <button onclick="selectView('old')" class="w-full py-4 mb-3 bg-blue-600 text-white rounded-xl font-bold">🎓 COLEGIO</button>
            <button onclick="selectView('current')" class="w-full py-4 bg-purple-600 text-white rounded-xl font-bold">💼 PRESENTES</button>
        </div>
    </div>

    <div id="app-main-content" class="hidden">
        <header class="bg-slate-900 text-white p-4 sticky top-0 z-40 flex justify-between items-center">
            <span class="font-bold">CODEMA 64</span>
            <div class="flex gap-2">
                <div id="current-uid-display"></div>
                <button id="notif-btn-header" class="hidden bg-amber-500 p-2 rounded-full text-white">🔔</button>
                <button id="add-btn-header" onclick="openDataEntryModal('add')" class="hidden bg-emerald-500 p-2 rounded-full text-white">＋</button>
            </div>
        </header>
        <main class="p-4 max-w-6xl mx-auto">
            <div class="flex flex-col md:flex-row gap-2 mb-6">
                <input type="text" id="search-input" onkeyup="performSearch()" placeholder="Buscar..." class="flex-grow p-3 rounded-lg border">
                <button id="toggle-all-btn" onclick="toggleAllPhotos()"></button>
            </div>
            <div id="orla-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"></div>
        </main>
    </div>

    <div id="modal-wrapper" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden" onclick="if(event.target===this)closeModal()">
        <div class="bg-slate-900 text-white rounded-2xl max-w-2xl w-full p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex flex-col md:flex-row gap-6">
                <img id="modal-photo" class="w-full md:w-64 h-64 object-cover rounded-xl">
                <div class="flex-grow">
                    <h2 id="modal-name" class="text-2xl font-bold mb-4"></h2>
                    <div id="past-details" class="mb-4 p-3 bg-slate-800 rounded-lg"></div>
                    <div id="current-details" class="p-3 bg-slate-800 rounded-lg"></div>
                    <button id="modal-edit-btn" class="hidden mt-4 w-full py-2 bg-slate-700 rounded-lg">✏️ Editar Ficha</button>
                </div>
            </div>
        </div>
    </div>

    <div id="data-entry-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 text-white p-6 rounded-2xl w-full max-w-lg">
            <form onsubmit="saveAlumnusData(event)" class="space-y-3">
                <input type="hidden" id="form-mode"><input type="hidden" id="form-doc-id">
                <input type="text" id="nombre" placeholder="Nombre" class="w-full p-2 bg-slate-800 rounded">
                <input type="text" id="apellidos" placeholder="Apellidos" class="w-full p-2 bg-slate-800 rounded">
                <input type="date" id="fechaNacimiento" class="w-full p-2 bg-slate-800 rounded">
                <input type="url" id="fotoAntiguaUrl" placeholder="URL Foto Colegio" class="w-full p-2 bg-slate-800 rounded">
                <input type="url" id="fotoActualUrl" placeholder="URL Foto Actual" class="w-full p-2 bg-slate-800 rounded">
                <input type="text" id="profesion-input" placeholder="Profesión" class="w-full p-2 bg-slate-800 rounded">
                <input type="text" id="ciudad-input" placeholder="Ciudad" class="w-full p-2 bg-slate-800 rounded">
                <button type="submit" class="w-full py-3 bg-emerald-600 rounded-xl font-bold">GUARDAR</button>
                <button type="button" onclick="closeDataEntryModal()" class="w-full py-2 text-slate-400">Cancelar</button>
            </form>
        </div>
    </div>

</body>
</html>
