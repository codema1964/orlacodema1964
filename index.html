<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #cbd5e1; }
        #splash-screen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.5s; }
        .hidden-splash { opacity: 0; visibility: hidden; pointer-events: none; }
        .photo-wrapper { position: relative; width: 100%; padding-top: 100%; overflow: hidden; border-radius: 0.75rem; background: #e2e8f0; }
        .photo-wrapper img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s; }
        .photo-wrapper .hidden-photo { opacity: 0; }
        .photo-wrapper:hover .hidden-photo { opacity: 1; }
        .photo-wrapper:hover .visible-photo { opacity: 0; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="admin-trigger-zone" class="mb-6 cursor-pointer active:scale-95 transition-transform">
            <svg class="w-20 h-20 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
        </div>
        <h1 id="splash-title" class="text-3xl font-black tracking-widest select-none">CODEMA 1964</h1>
        <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest">Iniciando Orla...</p>
        
        <div onclick="window.accesoSecretoAdmin()" class="absolute bottom-0 right-0 w-12 h-12 opacity-0 cursor-pointer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        const ADMIN_UID = 'hbQ6YVVOZqVQ6HbHgNhzeci6rQ52';
        const appId = 'default-app-id';
        let db, auth, alumniData=[], currentView=null, currentUserId=null, selectedPerson=null;

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            // 1. Procesar regreso de Google
            await getRedirectResult(auth).catch(err => console.error("Error redirect:", err));

            // 2. Gestionar estado de usuario
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUserId = user.uid;
                    if (currentUserId === ADMIN_UID) {
                        document.getElementById('admin-badge').classList.remove('hidden');
                        document.getElementById('add-btn').classList.remove('hidden');
                    }
                    setTimeout(() => {
                        document.getElementById('splash-screen').classList.add('hidden-splash');
                        document.getElementById('selection-modal').classList.remove('hidden');
                    }, 1500);
                } else {
                    signInAnonymously(auth);
                }
            });
        }

        // FUNCIÓN DE ACCESO (La "Llave")
        window.accesoSecretoAdmin = function() {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            signInWithRedirect(auth, provider);
        };

        // Activador 1: Escribir admin
        let buffer = "";
        window.addEventListener('keydown', (e) => {
            buffer += e.key.toLowerCase();
            if (buffer.endsWith("admin")) window.accesoSecretoAdmin();
            if (buffer.length > 10) buffer = buffer.substring(1);
        });

        // Activador 2: Mantener pulsado el título 3 segundos
        let timer;
        const title = document.getElementById('splash-title');
        title.addEventListener('mousedown', () => timer = setTimeout(window.accesoSecretoAdmin, 3000));
        title.addEventListener('touchstart', () => timer = setTimeout(window.accesoSecretoAdmin, 3000));
        title.addEventListener('mouseup', () => clearTimeout(timer));
        title.addEventListener('touchend', () => clearTimeout(timer));

        // --- Lógica Orla ---
        window.selectView = (v) => {
            currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            onSnapshot(query(collection(db, `/artifacts/${appId}/public/data/alumni`)), s => {
                alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>(a.apellidos||'').localeCompare(b.apellidos||''));
                render(alumniData);
            });
        };

        function render(data) {
            const container = document.getElementById('orla-grid');
            const isOld = currentView === 'old';
            container.innerHTML = data.map(p => `
                <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                    <div class="photo-wrapper cursor-pointer mb-2" onclick="openModal('${p.id}')">
                        <img src="${(isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || ''}" onerror="this.src='https://placehold.co/200?text=?'" class="visible-photo">
                        <img src="${(isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl) || ''}" onerror="this.src='https://placehold.co/200?text=?'" class="hidden-photo">
                    </div>
                    <div class="text-[13px] font-bold text-slate-800 leading-tight">${p.nombre} ${p.apellidos}</div>
                </div>
            `).join('');
            document.getElementById('view-toggle').innerHTML = isOld ? '💼 VER ACTUALIDAD' : '🎓 VER COLEGIO';
        }

        window.openModal = (id) => {
            selectedPerson = alumniData.find(p=>p.id===id);
            const isOld = currentView === 'old';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('m-name').textContent = `${selectedPerson.nombre} ${selectedPerson.apellidos}`;
            document.getElementById('m-img').src = (isOld ? selectedPerson.antiguo?.fotoUrl : selectedPerson.actual?.fotoUrl) || '';
            document.getElementById('m-data').innerHTML = `
                <p class="text-sm"><b>Profesión:</b> ${selectedPerson.actual?.profesion || '-'}</p>
                <p class="text-sm"><b>Ciudad:</b> ${selectedPerson.actual?.ciudad || '-'}</p>
            `;
            if(currentUserId === ADMIN_UID) document.getElementById('m-edit').classList.remove('hidden');
        };

        window.toggleView = () => { currentView = currentView === 'old' ? 'current' : 'old'; render(alumniData); };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.openEditor = (mode) => {
            document.getElementById('editor').classList.remove('hidden');
            if(mode === 'edit') {
                document.getElementById('e-id').value = selectedPerson.id;
                document.getElementById('e-nom').value = selectedPerson.nombre;
                document.getElementById('e-ape').value = selectedPerson.apellidos;
            }
        };

        window.save = async (e) => {
            e.preventDefault();
            const id = document.getElementById('e-id').value;
            const data = {
                nombre: document.getElementById('e-nom').value,
                apellidos: document.getElementById('e-ape').value,
                antiguo: { fotoUrl: document.getElementById('e-f1').value },
                actual: { fotoUrl: document.getElementById('e-f2').value, profesion: document.getElementById('e-prof').value }
            };
            id ? await updateDoc(doc(db, `/artifacts/${appId}/public/data/alumni`, id), data) : await addDoc(collection(db, `/artifacts/${appId}/public/data/alumni`), data);
            location.reload();
        };

        init();
    </script>

    <div id="selection-modal" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-2xl w-full max-w-xs text-center">
            <h2 class="font-black text-xl mb-6">¿Qué quieres ver?</h2>
            <button onclick="selectView('old')" class="w-full py-4 mb-3 bg-blue-600 text-white rounded-xl font-bold">🎓 COLEGIO</button>
            <button onclick="selectView('current')" class="w-full py-4 bg-purple-600 text-white rounded-xl font-bold">💼 PRESENTES</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-slate-900 text-white p-4 sticky top-0 z-40 flex justify-between items-center shadow-lg">
            <span class="font-bold tracking-tighter">CODEMA 64</span>
            <div class="flex gap-2 items-center">
                <span id="admin-badge" class="hidden bg-emerald-500 text-[9px] px-2 py-1 rounded-full font-bold">ADMIN</span>
                <button id="add-btn" onclick="openEditor('add')" class="hidden bg-emerald-500 w-8 h-8 rounded-full">＋</button>
            </div>
        </header>
        <div class="p-4 max-w-5xl mx-auto">
            <button id="view-toggle" onclick="toggleView()" class="w-full mb-6 py-3 rounded-lg text-white font-bold shadow-md"></button>
            <div id="orla-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 hidden" onclick="if(event.target===this)closeModal()">
        <div class="bg-slate-900 text-white rounded-2xl p-6 w-full max-w-sm">
            <img id="m-img" class="w-full h-64 object-cover rounded-xl mb-4">
            <h2 id="m-name" class="text-xl font-bold mb-2"></h2>
            <div id="m-data" class="space-y-1 opacity-80 mb-6"></div>
            <button id="m-edit" onclick="openEditor('edit')" class="hidden w-full py-3 bg-slate-700 rounded-xl mb-2">Editar</button>
            <button onclick="closeModal()" class="w-full py-3 text-slate-400">Cerrar</button>
        </div>
    </div>

    <div id="editor" class="fixed inset-0 bg-black/95 z-[60] flex items-center justify-center p-4 hidden">
        <form onsubmit="save(event)" class="bg-white p-6 rounded-2xl w-full max-w-sm space-y-3">
            <input type="hidden" id="e-id">
            <input type="text" id="e-nom" placeholder="Nombre" class="w-full p-3 border rounded-lg">
            <input type="text" id="e-ape" placeholder="Apellidos" class="w-full p-3 border rounded-lg">
            <input type="url" id="e-f1" placeholder="URL Foto Colegio" class="w-full p-3 border rounded-lg">
            <input type="url" id="e-f2" placeholder="URL Foto Actual" class="w-full p-3 border rounded-lg">
            <input type="text" id="e-prof" placeholder="Profesión" class="w-full p-3 border rounded-lg">
            <button type="submit" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl">GUARDAR</button>
            <button type="button" onclick="document.getElementById('editor').classList.add('hidden')" class="w-full py-2 text-slate-500">Cancelar</button>
        </form>
    </div>

</body>
</html>
