<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orla Interactiva CODEMA - Generación del 64</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="Orla-Codema64.ico">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a', 'brand-teal': '#0d9488', 'brand-amber': '#d97706',
                        'old-blue': '#3b82f6', 'new-purple': '#8b5cf6', 'btn-red': '#ef4444', 'modal-bg': '#0f172a',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); min-height: 100vh; }
        .photo-wrapper { position: relative; overflow: hidden; border-radius: 0.75rem; width: 100%; padding-top: 100%; background-color: #e2e8f0; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .photo-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .photo-wrapper img.hidden-photo { opacity: 0; }
        .photo-wrapper:hover img.hidden-photo { opacity: 1; }
        .photo-wrapper:hover img.visible-photo { opacity: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 50; }
        #splash-screen { position: fixed; inset: 0; background-color: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #splash-screen.hidden-splash { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 class="text-white text-2xl font-black tracking-widest animate-pulse uppercase">Codema 1964</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIza" + "SyAZgttBrxRAeeRELVA-3j71hQZ4NbxoeNo", 
            authDomain: "orlageneracion64.firebaseapp.com",
            projectId: "orlageneracion64",
            storageBucket: "orlageneracion64.firebasestorage.app",
            messagingSenderId: "550229291802",
            appId: "1:550229291802:web:1907dc83e4c3c0facc32a3"
        };

        const ADMIN_UID = 'TLshlr1Vz7PasQvIYXhbytBAq1n1';
        const VAPID_KEY = 'BBEipgrXPOxTPYzRFP63bF6NJVsDPUnsmhMhqAXSSaoX75oBEUbiNJZ0LG5GMxBrhipkcyBQZuTZ3WCscou5sY0';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let messaging; try { messaging = getMessaging(app); } catch(e) {}

        window.alumniData = [];
        window.currentView = null;
        window.selectedPerson = null;
        window.currentUserId = null;

        async function init() {
            await setPersistence(auth, browserLocalPersistence);
            await getRedirectResult(auth);

            onAuthStateChanged(auth, u => {
                if(u) {
                    window.currentUserId = u.uid;
                    const isAdmin = (u.uid === ADMIN_UID);
                    if(isAdmin) document.getElementById('admin-tools').classList.remove('hidden');
                    if(messaging) document.getElementById('notif-btn').classList.remove('hidden');
                } else {
                    signInAnonymously(auth);
                }
                document.getElementById('splash-screen').classList.add('hidden-splash');
                if(!window.currentView) document.getElementById('selection-modal').classList.remove('hidden');
            });
        }

        window.accesoSecretoAdmin = () => signInWithRedirect(auth, new GoogleAuthProvider());

        window.activarNotificaciones = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted' && messaging) {
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    await setDoc(doc(db, "suscripciones", window.currentUserId), { token, date: new Date() });
                    alert("Notificaciones activadas");
                }
            } catch (e) { alert("Error de notificaciones"); }
        };

        window.selectView = (v) => {
            window.currentView = v;
            document.getElementById('selection-modal').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            onSnapshot(query(collection(db, "artifacts/default-app-id/public/data/alumni")), s => {
                window.alumniData = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=> (a.apellidos || "").localeCompare(b.apellidos || ""));
                renderOrla(window.alumniData);
            });
        };

        function renderOrla(datos) {
            const isOld = window.currentView === 'old';
            document.getElementById('orla-grid').innerHTML = datos.map(p => `
                <div class="bg-white p-2 rounded-xl shadow-sm text-center">
                    <div class="photo-wrapper mb-2" onclick="openModal('${p.id}')">
                        <img src="${(isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || 'https://via.placeholder.com/300?text=Sin+Foto'}" class="visible-photo">
                        <img src="${(isOld ? p.actual?.fotoUrl : p.antiguo?.fotoUrl) || 'https://via.placeholder.com/300?text=Sin+Foto'}" class="hidden-photo">
                    </div>
                    <div class="text-[12px] font-bold leading-tight text-slate-800">${p.nombre || ""}<br>${p.apellidos || ""}</div>
                </div>`).join('');
            
            const btn = document.getElementById('toggle-btn');
            btn.innerHTML = isOld ? '💼 VER ACTUALIDAD' : '🎓 VER COLEGIO';
            btn.className = `w-full md:w-auto px-6 py-3 rounded-xl text-white font-black shadow-lg ${isOld?'bg-new-purple':'bg-old-blue'}`;
        }

        window.openModal = (id) => {
            window.selectedPerson = window.alumniData.find(p => p.id === id);
            const p = window.selectedPerson;
            const isOld = window.currentView === 'old';
            const isAdmin = (window.currentUserId === ADMIN_UID);

            document.getElementById('m-photo').src = (isOld ? p.antiguo?.fotoUrl : p.actual?.fotoUrl) || 'https://via.placeholder.com/300?text=Sin+Foto';
            document.getElementById('m-name').innerText = `${p.nombre || ""} ${p.apellidos || ""}`;
            
            const row = (l, v) => `<div class="flex justify-between py-1 border-b border-slate-700 text-sm"><span>${l}</span><span class="text-slate-300 font-medium">${v||'-'}</span></div>`;
            
            document.getElementById('m-data-old').innerHTML = `<h4 class="text-old-blue font-bold text-[10px] mb-2 uppercase tracking-widest">🎓 Colegio</h4>
                ${row('Nacimiento', p.fechaNacimiento)}
                ${row('Año Entrada', p.antiguo?.anoEntrada)}
                ${row('Año Salida', p.antiguo?.anoSalida)}
                ${row('Curso Entrada', p.antiguo?.cursoEntrada)}
                ${row('Curso Salida', p.antiguo?.cursoSalida)}`;

            document.getElementById('m-data-new').innerHTML = `<h4 class="text-new-purple font-bold text-[10px] mb-2 uppercase tracking-widest">💼 Actualidad</h4>
                ${row('Profesión', p.actual?.profesion)}
                ${row('Ciudad', p.actual?.ciudad)}
                ${row('Email', p.actual?.email)}`;

            document.getElementById('m-edit-btn').classList.toggle('hidden', !isAdmin);
            document.getElementById('modal').classList.remove('hidden');
        };

        window.openEdit = (modo) => {
            const form = document.getElementById('edit-form');
            form.reset();
            document.getElementById('f-modo').value = modo;

            if(modo === 'editar') {
                const p = window.selectedPerson;
                document.getElementById('f-id').value = p.id;
                document.getElementById('f-nombre').value = p.nombre || '';
                document.getElementById('f-apellidos').value = p.apellidos || '';
                document.getElementById('f-nacimiento').value = p.fechaNacimiento || '';
                document.getElementById('f-foto-o').value = p.antiguo?.fotoUrl || '';
                document.getElementById('f-ent').value = p.antiguo?.anoEntrada || '';
                document.getElementById('f-sal').value = p.antiguo?.anoSalida || '';
                document.getElementById('f-cent').value = p.antiguo?.cursoEntrada || '';
                document.getElementById('f-csal').value = p.antiguo?.cursoSalida || '';
                document.getElementById('f-foto-n').value = p.actual?.fotoUrl || '';
                document.getElementById('f-prof').value = p.actual?.profesion || '';
                document.getElementById('f-ciu').value = p.actual?.ciudad || '';
                document.getElementById('f-mail').value = p.actual?.email || '';
            }
            
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveData = async (e) => {
            e.preventDefault();
            const modo = document.getElementById('f-modo').value;
            const data = {
                nombre: document.getElementById('f-nombre').value,
                apellidos: document.getElementById('f-apellidos').value,
                fechaNacimiento: document.getElementById('f-nacimiento').value,
                antiguo: {
                    fotoUrl: document.getElementById('f-foto-o').value,
                    anoEntrada: document.getElementById('f-ent').value,
                    anoSalida: document.getElementById('f-sal').value,
                    cursoEntrada: document.getElementById('f-cent').value,
                    cursoSalida: document.getElementById('f-csal').value
                },
                actual: { 
                    fotoUrl: document.getElementById('f-foto-n').value,
                    profesion: document.getElementById('f-prof').value,
                    ciudad: document.getElementById('f-ciu').value,
                    email: document.getElementById('f-mail').value
                }
            };

            try {
                const col = collection(db, "artifacts/default-app-id/public/data/alumni");
                if(modo === 'editar') await updateDoc(doc(db, "artifacts/default-app-id/public/data/alumni", document.getElementById('f-id').value), data);
                else await addDoc(col, data);
                
                document.getElementById('edit-modal').classList.add('hidden');
                alert("Guardado correctamente");
            } catch (err) { alert("Sin permisos. Escribe 'admin'."); }
        };

        let buffer = "";
        window.addEventListener('keydown', e => {
            buffer += e.key.toLowerCase();
            if(buffer.endsWith("admin")) window.accesoSecretoAdmin();
            if(buffer.length > 10) buffer = buffer.substring(1);
        });

        init();
    </script>

    <div id="selection-modal" class="modal-overlay fixed inset-0 flex items-center justify-center hidden p-4">
        <div class="bg-white p-10 rounded-3xl text-center max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-black mb-8 italic">CODEMA 1964</h2>
            <button onclick="selectView('old')" class="w-full py-5 mb-4 bg-old-blue text-white rounded-2xl font-black">🎓 VER COLEGIO</button>
            <button onclick="selectView('current')" class="w-full py-5 bg-new-purple text-white rounded-2xl font-black">💼 VER ACTUALIDAD</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-brand-dark text-white p-4 sticky top-0 z-40 flex justify-between items-center shadow-xl">
            <span class="font-black italic">CODEMA 64</span>
            <div class="flex gap-2 items-center">
                <div id="admin-tools" class="hidden"><span class="bg-emerald-500 text-[10px] px-2 py-1 rounded font-bold">ADMIN</span></div>
                <button id="notif-btn" onclick="activarNotificaciones()" class="hidden bg-brand-amber p-2 rounded-full">🔔</button>
                <button onclick="openEdit('nuevo')" class="bg-brand-teal px-4 py-2 rounded-lg text-xs font-bold">＋ ENVIAR MIS DATOS</button>
            </div>
        </header>

        <main class="p-4 max-w-6xl mx-auto">
            <div class="mb-6 flex flex-col md:flex-row gap-4 items-center">
                <input type="text" onkeyup="renderOrla(window.alumniData.filter(p => (p.nombre+' '+p.apellidos).toLowerCase().includes(this.value.toLowerCase())))" placeholder="Buscar compañero..." class="flex-grow p-4 rounded-xl border border-slate-300 outline-none w-full">
                <button id="toggle-btn" onclick="window.currentView = window.currentView === 'old' ? 'current' : 'old'; renderOrla(window.alumniData);"></button>
            </div>
            <div id="orla-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
        </main>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 flex items-center justify-center hidden p-4" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="bg-modal-bg text-white rounded-3xl w-full max-w-2xl overflow-hidden border border-slate-700 shadow-2xl">
            <div class="p-8 flex flex-col md:flex-row gap-8">
                <div class="md:w-1/3 text-center">
                    <img id="m-photo" class="w-full h-72 object-cover rounded-2xl border-4 border-slate-700 mb-6">
                    <button id="m-edit-btn" onclick="openEdit('editar')" class="hidden w-full py-3 bg-slate-700 rounded-xl text-sm font-bold border border-slate-500">✏️ EDITAR</button>
                </div>
                <div class="md:w-2/3">
                    <h2 id="m-name" class="text-3xl font-black mb-6 italic"></h2>
                    <div id="m-data-old" class="mb-6 p-4 bg-slate-800/50 rounded-2xl border border-slate-700"></div>
                    <div id="m-data-new" class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700"></div>
                    <button onclick="document.getElementById('modal').classList.add('hidden')" class="mt-4 w-full text-slate-500 text-xs uppercase font-bold">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay fixed inset-0 flex items-center justify-center hidden p-4">
        <form id="edit-form" onsubmit="saveData(event)" class="bg-modal-bg text-white p-8 rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto border-2 border-brand-teal space-y-4">
            <input type="hidden" id="f-id"><input type="hidden" id="f-modo">
            <h2 class="font-black italic text-xl border-b border-slate-700 pb-2 uppercase">Formulario de Datos</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="f-nombre" placeholder="Nombre" required class="p-3 bg-slate-800 rounded-xl border border-slate-600 outline-none">
                <input id="f-apellidos" placeholder="Apellidos" required class="p-3 bg-slate-800 rounded-xl border border-slate-600 outline-none">
            </div>
            <input id="f-nacimiento" placeholder="Nacimiento (DD/MM/AAAA)" class="w-full p-3 bg-slate-800 rounded-xl border border-slate-600">
            <div class="grid grid-cols-2 gap-2">
                <input id="f-ent" placeholder="Año Entrada" class="p-2 bg-slate-800 rounded-lg border border-slate-600 text-xs">
                <input id="f-sal" placeholder="Año Salida" class="p-2 bg-slate-800 rounded-lg border border-slate-600 text-xs">
                <input id="f-cent" placeholder="Curso Entrada" class="p-2 bg-slate-800 rounded-lg border border-slate-600 text-xs">
                <input id="f-csal" placeholder="Curso Salida" class="p-2 bg-slate-800 rounded-lg border border-slate-600 text-xs">
            </div>
            <input id="f-foto-o" placeholder="URL Foto Colegio" class="w-full p-3 bg-slate-800 rounded-xl border border-slate-600 text-sm">
            <input id="f-foto-n" placeholder="URL Foto Actual" class="w-full p-3 bg-slate-800 rounded-xl border border-slate-600 text-sm">
            <input id="f-prof" placeholder="Profesión" class="w-full p-3 bg-slate-800 rounded-xl border border-slate-600 text-sm">
            <div class="grid grid-cols-2 gap-4">
                <input id="f-ciu" placeholder="Ciudad" class="p-3 bg-slate-800 rounded-xl border border-slate-600 text-sm">
                <input id="f-mail" placeholder="Email" class="p-3 bg-slate-800 rounded-xl border border-slate-600 text-sm">
            </div>
            <button type="submit" class="w-full py-5 bg-brand-teal text-white font-black rounded-2xl shadow-xl uppercase italic">Guardar Datos</button>
            <button type="button" onclick="document.getElementById('edit-modal').classList.add('hidden')" class="w-full text-slate-500 text-xs font-bold">CANCELAR</button>
        </form>
    </div>

</body>
</html>
